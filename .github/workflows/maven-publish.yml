name: Build and publish themes

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build theme modules
        run: >-
          mvn -B -ntp verify
          -pl :vaadin-themes,:theme-seagod,:theme-fjord,:theme-terminal-synth,:theme-novelist
          -DskipTests

      - name: Publish theme modules to GitHub Packages
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          mvn -B -ntp deploy
          -pl :vaadin-themes,:theme-seagod,:theme-fjord,:theme-terminal-synth,:theme-novelist
          -DskipTests
